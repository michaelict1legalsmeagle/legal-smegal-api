  --font-sans:  'IBM Plex Sans', sans-serif;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-sans); font-size: 13px;
  background: #d4d4d4; color: #1a1a1a;

  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
}
.tb-logo {
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  letter-spacing: 0.02em; color: var(--text-pri); text-decoration: none;

.tb-logo span { color: var(--accent); }
.tb-right { display: flex; align-items: center; gap: 8px; }
.tb-btn {
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;

  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; white-space: nowrap;
  background: none; border: 1px solid var(--border); color: var(--text-sec);

.tb-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.tb-btn:hover { border-color: var(--accent); color: var(--accent); }
.tb-print {

}
.tb-print:hover { background: #d4b050; border-color: #d4b050; color: #080c10; }

/* ── LOADING STATE ── */
.loading-wrap {

  align-items: center; justify-content: center;

}
.loading-text { font-family: var(--font-mono); font-size: 12px; color: var(--text-sec); }
.loading-error { font-family: var(--font-sans); font-size: 13px; color: var(--red); text-align: center; max-width: 400px; line-height: 1.6; }

.g2-dot { width:6px; height:6px; border-radius:50%; margin-top:4px; flex-shrink:0; }

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtGbp(v) {
  if (v == null || v === '') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmtPct(v) {
  if (v == null) return '—';
  return parseFloat(v).toFixed(2) + '%';
}

function today() {
  return new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function sevBadge(sev) {
  const s = (sev || 'note').toLowerCase();
  const map = { critical:'Critical disclosure', high:'Requires clarification', missing:'Missing evidence', note:'Note' };
  const label = map[s] || s.toUpperCase();
  return `<span class="flag-badge badge-${s}">${esc(label)}</span>`;
}

// Map severity to flag-card class
function sevToCardClass(sev) {
  const s = (sev||'note').toLowerCase();
  if (s === 'critical') return 'flag-card-critical';
  if (s === 'high')     return 'flag-card-clarify';
  if (s === 'missing')  return 'flag-card-missing';
  return 'flag-card-note';
}

// Build pack status text from flags
function buildPackStatus(counts, sj) {
  const c = counts.critical || 0;
  const h = counts.high || 0;
  const m = counts.missing || 0;
  const n = counts.note || 0;
  const total = c + h + m + n;

  if (total === 0) {
    return 'Pack status: No disclosures extracted from the uploaded documents. Verify that all relevant documents have been uploaded and contain selectable text. This report does not provide legal advice, valuation, bid guidance, or investment recommendation.';
  }

  const parts = [];
  if (c > 0) parts.push(`${c} critical disclosure${c > 1 ? 's' : ''}`);
  if (h > 0) parts.push(`${h} item${h > 1 ? 's' : ''} requiring clarification`);
  if (m > 0) parts.push(`${m} item${m > 1 ? 's' : ''} of missing or unclear evidence`);

  const has = sj.special_conditions || {};
  const costItems = [];
  if (has.buyers_premium_pct || has.buyers_premium_gbp) costItems.push('buyer-cost exposure');
  if (has.seller_legal_costs_gbp) costItems.push('seller legal costs payable by buyer');
  if (has.vat_elected) costItems.push('VAT election');

  let summary = `Pack status: The uploaded legal pack discloses ${parts.join(', ')}.`;
  if (costItems.length > 0) summary += ` Buyer-cost and liability items identified include: ${costItems.join(', ')}.`;
  summary += ' This report does not provide legal advice, valuation, bid guidance, or investment recommendation.';
  return summary;
}

// Build disclosure summary paragraph
function buildDisclosureSummary(sj, flags) {
  if (sj.viability_statement) {
    // Rewrite to remove decision language
    let v = sj.viability_statement;
    v = v.replace(/\b(go|no.go|proceed|do not proceed|buy|do not buy|bid|walk away|strong opportunity|great potential)\b/gi, '');
    v = v.replace(/\b(risk score|deal score|score)\b/gi, 'disclosure count');
    v = v.replace(/\b(ceiling|max bid|valuation|price confidence|bidding strategy)\b/gi, '');
    v = v.replace(/\s{2,}/g, ' ').trim();
    if (v.length > 30) return v;
  }

  const sc = sj.special_conditions || {};
  const ct = sj.completion_terms || {};
  const counts = sj.flag_counts || {};
  const hasCosts = sc.buyers_premium_pct || sc.buyers_premium_gbp || sc.seller_legal_costs_gbp || sc.vat_elected || sc.admin_fee_gbp;
  const hasMissing = (counts.missing || 0) > 0;
  const hasCritical = (counts.critical || 0) > 0;

  let s = 'The uploaded legal pack discloses ';
  const items = [];
  if (hasCritical) items.push('title and contractual matters requiring solicitor confirmation');
  if (hasCosts) items.push('buyer-cost and liability items');
  if (hasMissing) items.push('missing or unclear evidence');
  if (ct.completion_days && ct.completion_days < 28) items.push('a non-standard completion period');
  if (sc.addendum_present) items.push('a pack addendum');

  s += (items.length > 0 ? items.join(', ') : 'legal-pack content') + '.';
  s += ' Several items may affect completion obligations, registration, lender requirements, or buyer responsibility after exchange.';
  s += ' The report records the disclosed items and questions to raise; it does not provide legal advice, valuation, financial modelling, or bid guidance.';
  return s;
}

function renderReport(deal, sj, docs, isSubscriber) {
  const prop   = sj.property || {};
  const sc     = sj.special_conditions || {};
  const ct     = sj.completion_terms || {};
  const pc     = sj.pack_completeness || {};
  const flags  = Array.isArray(sj.flags) ? sj.flags : [];
  const counts = sj.flag_counts || { critical:0, high:0, missing:0, note:0 };

  const address  = prop.address || deal.address || deal.deal_name || 'Address not extracted';
  const postcode = prop.postcode || deal.postcode || '';
  const tenure   = prop.tenure || '—';
  const lease    = prop.lease_years ? prop.lease_years + ' years remaining' : null;
  const dealType = prop.type || deal.deal_type || '—';
  const lotNum   = prop.lot_number || deal.lot_number || '—';
  const guideGbp = deal.guide_price ? fmtGbp(deal.guide_price)
                 : (prop.guide_price_pence ? fmtGbp(prop.guide_price_pence / 100) : '—');
  const reportDate = today();
  const docCount   = docs.length || sj.documents_processed || '—';
  const score      = sj.deal_score != null ? sj.deal_score : '—';

  // Buyer cost lines
  const costLines = [];
  if (sc.buyers_premium_gbp || sc.buyers_premium_pct) {
    costLines.push({
      item:   "Buyer's premium",
      amount: sc.buyers_premium_gbp ? fmtGbp(sc.buyers_premium_gbp) : fmtPct(sc.buyers_premium_pct) + ' of hammer price',
      type:   'Quantified cost',
      source: 'Special Conditions'
    });
  }
  if (sc.admin_fee_gbp) {
    costLines.push({ item: 'Administration fee', amount: fmtGbp(sc.admin_fee_gbp) + (sc.vat_elected ? ' + VAT' : ''), type: 'Quantified cost', source: 'Special Conditions' });
  }
  if (sc.seller_legal_costs_gbp) {
    costLines.push({ item: "Seller's legal costs (buyer payable)", amount: fmtGbp(sc.seller_legal_costs_gbp), type: 'Quantified cost', source: 'Special Conditions' });
  }
  if (sc.vat_elected) {
    costLines.push({ item: 'VAT elected on sale — purchase price +20%', amount: 'See solicitor', type: 'Liability uncertainty', source: 'Special Conditions' });
  }
  if (ct.deposit_pct && ct.deposit_refundable === false) {
    costLines.push({ item: 'Non-refundable deposit', amount: fmtPct(ct.deposit_pct) + ' of hammer price', type: 'Timing liability', source: 'Special Conditions' });
  }
  // Check flags for arrears, indemnities
  flags.forEach(f => {
    const t = (f.title || '').toLowerCase();
    const e = (f.evidence || f.summation || '').toLowerCase();
    const isArrear = t.includes('arrear') || e.includes('arrear');
    const isIndemnity = t.includes('indemni') || e.includes('indemni');
    const isInsurance = t.includes('insurance from exchange') || t.includes('insurance at exchange');
    const isNoticeToComplete = t.includes('notice to complete') || t.includes('late completion');
    if ((isArrear || isIndemnity || isInsurance || isNoticeToComplete) && costLines.length < 14) {
      const hasAmount = f.evidence && /£[\d,]+/.test(f.evidence);
      costLines.push({
        item:   f.title,
        amount: hasAmount ? (f.evidence.match(/£[\d,]+/)?.[0] || 'Not evidenced') : 'Not evidenced',
        type:   isArrear ? 'Unquantified liability' : isIndemnity ? 'Risk transfer' : isInsurance ? 'Timing liability' : 'Timing liability',
        source: f.source_document || '[Source: Not evidenced in uploaded material]'
      });
    }
  });

  // Total if possible
  let totalCostNote = '';
  const quantified = costLines.filter(c => c.type === 'Quantified cost' && /^£/.test(c.amount));
  if (quantified.length >= 2) {
    const sum = quantified.reduce((acc, c) => {
      const n = parseFloat(c.amount.replace(/[£,]/g, ''));
      return acc + (isNaN(n) ? 0 : n);
    }, 0);
    if (sum > 0) totalCostNote = fmtGbp(sum) + ' quantified buyer-cost exposure (excluding SDLT and conveyancing fees)';
  }

  // Missing evidence flags
  const missingFlags = flags.filter(f => (f.severity||'').toLowerCase() === 'missing');

  // ── PRIORITY QUESTIONS TO RAISE (max 8, mixed recipients, ranked) ──
  // Priority order: cost/liability > missing title/lease/search > completion/timing >
  // VAT/tax > lender/funding > freeholder confirmations > auctioneer/seller factuals
  const PRIORITY_ORDER = ['Critical', 'Important', 'Clarification'];
  const priorityQ = [];

  // Helper to add question if budget not exhausted
  const Q_CAP = isSubscriber ? 50 : 8;
  function addQ(priority, ask, question, reason) {
    if (priorityQ.length >= Q_CAP) return;
    if (!question || !question.trim()) return;
    priorityQ.push({ priority, ask, question: question.trim(), reason: reason || '' });
  }

  // Pass 1 — cost and liability items (Critical)
  flags.forEach(f => {
    const sev = (f.severity||'').toLowerCase();
    const t   = (f.title||'').toLowerCase();
    const isCost = t.includes('premium') || t.includes('admin fee') || t.includes('seller') ||
                   t.includes('vat') || t.includes('arrear') || t.includes('indemni') ||
                   t.includes('insurance') || t.includes('late completion') || t.includes('notice to complete');
    if (isCost && f.action) {
      const isAuction = t.includes('premium') || t.includes('addendum') || t.includes('condition');
      addQ('Critical', isAuction ? 'Auctioneer' : 'Solicitor', f.action,
           f.implication || 'Buyer-cost or liability exposure identified in uploaded pack');
    }
  });

  // Pass 2 — missing title/lease/search (Critical)
  flags.forEach(f => {
    const sev = (f.severity||'').toLowerCase();
    const t   = (f.title||'').toLowerCase();
    if (sev === 'missing' && f.action) {
      const isLease = t.includes('lease') || t.includes('management') || t.includes('service charge') || t.includes('ground rent');
      const isSearch = t.includes('search') || t.includes('epc') || t.includes('drain');
      addQ('Critical',
           isLease ? 'Freeholder / Managing agent' : isSearch ? 'Solicitor' : 'Solicitor',
           f.action,
           f.summation || 'Evidence missing from uploaded pack — may affect title, registration, or lender requirements');
    }
  });

  // Pass 3 — completion / timing (Important)
  flags.forEach(f => {
    const sev = (f.severity||'').toLowerCase();
    const t   = (f.title||'').toLowerCase();
    const isTiming = t.includes('completion') || t.includes('deposit') || t.includes('exchange') ||
                     t.includes('vacant possession') || t.includes('notice to complete');
    if (isTiming && f.action && (sev === 'critical' || sev === 'high')) {
      addQ('Important', 'Solicitor', f.action,
           f.implication || 'Completion or timing obligation identified in uploaded pack');
    }
  });

  // Pass 4 — VAT / tax (Important)
  if (sc.vat_elected) {
    addQ('Important', 'Solicitor',
         'Confirm whether the VAT election applies to this transaction, whether the buyer is registered for VAT, and the net cost impact.',
         'VAT election identified — purchase price +20% if applicable and buyer is not VAT-registered');
  }

  // Pass 5 — lender / funding blockers (Important)
  flags.forEach(f => {
    const t = (f.title||'').toLowerCase();
    const isLender = t.includes('lender') || t.includes('mortgage') || t.includes('ground rent') || t.includes('rpi') || t.includes('uncapped');
    if (isLender && f.action) {
      addQ('Important', 'Lender / Broker', f.action,
           f.implication || 'Item may affect lender acceptability or mortgage availability');
    }
  });

  // Pass 6 — freeholder / managing agent (Clarification)
  flags.forEach(f => {
    const t = (f.title||'').toLowerCase();
    const isFreeholder = t.includes('service charge') || t.includes('ground rent') || t.includes('management') ||
                         t.includes('arrear') || t.includes('freeholder');
    if (isFreeholder && f.action) {
      addQ('Clarification', 'Freeholder / Managing agent', f.action,
           f.implication || 'Lease or management obligation requires freeholder confirmation');
    }
  });

  // Pass 7 — auctioneer / seller factual (Clarification)
  flags.forEach(f => {
    const sev = (f.severity||'').toLowerCase();
    const t   = (f.title||'').toLowerCase();
    const isAuction = t.includes('addendum') || t.includes('auction') || t.includes('lot');
    const isSeller  = t.includes('vacant possession') || t.includes('occupan') || t.includes('tenancy') || t.includes('tenanted');
    if ((isAuction || isSeller) && f.action && sev !== 'note') {
      addQ('Clarification', isAuction ? 'Auctioneer' : 'Seller / Agent', f.action,
           f.implication || 'Factual clarification required before bidding');
    }
  });

  // Fill remaining slots from sj.solicitor_questions if present (Clarification)
  if (Array.isArray(sj.solicitor_questions)) {
    sj.solicitor_questions.forEach(q => {
      addQ('Clarification', 'Solicitor', q, 'Solicitor question from legal-pack analysis');
    });
  }

  // Dedup by question text
  const seenQ = new Set();
  const uniquePriorityQ = priorityQ.filter(q => {
    const k = q.question.toLowerCase().slice(0, 80);
    if (seenQ.has(k)) return false;
    seenQ.add(k);
    return true;
  }).slice(0, isSubscriber ? 50 : 8);

  // Legal + title flags
  const legalFlags = flags.filter(f => {
    const t = (f.title||'').toLowerCase();
    return t.includes('covenant') || t.includes('title') || t.includes('restrict') ||
           t.includes('possessory') || t.includes('lease') || t.includes('easement') ||
           t.includes('boundary') || t.includes('right of way') || t.includes('access') ||
           t.includes('guarantee') || t.includes('lender') || t.includes('charge');
  });

  // Timing flags
  const timingFlags = flags.filter(f => {
    const t = (f.title||'').toLowerCase();
    return t.includes('completion') || t.includes('deposit') || t.includes('exchange') ||
           t.includes('insurance') || t.includes('notice') || t.includes('addendum') ||
           t.includes('search') || t.includes('timing') || t.includes('late completion');
  });

  // Key extracted data cells
  const kvItems = [
    { label: 'Address',        value: prop.address || 'Not extracted',           source: 'Legal Pack' },
    { label: 'Postcode',       value: prop.postcode || '—',                       source: 'Legal Pack' },
    { label: 'Tenure',         value: tenure + (lease ? ' · ' + lease : ''),     source: 'Title Register' },
    { label: 'Deal type',      value: dealType,                                   source: 'Legal Pack' },
    { label: 'Guide price',    value: guideGbp,                                   source: 'Auction Conditions' },
    { label: 'Deposit',        value: ct.deposit_pct ? fmtPct(ct.deposit_pct) + (ct.deposit_refundable === false ? ' · Non-refundable' : '') : '—', source: 'Special Conditions' },
    { label: 'Completion',     value: ct.completion_days ? ct.completion_days + ' days' : '—', source: 'Special Conditions' },
    { label: 'Vacant possession', value: ct.vacant_possession === false ? 'Not confirmed' : ct.vacant_possession === true ? 'Confirmed' : '—', source: 'Special Conditions' },
    { label: "Buyer's premium", value: sc.buyers_premium_pct ? fmtPct(sc.buyers_premium_pct) : sc.buyers_premium_gbp ? fmtGbp(sc.buyers_premium_gbp) : '—', source: 'Special Conditions' },
    { label: 'VAT elected',    value: sc.vat_elected ? 'Yes — +20% on purchase price' : '—', source: 'Special Conditions' },
    { label: 'Addendum',       value: sc.addendum_present ? 'Present' + (sc.addendum_date ? ' · ' + sc.addendum_date : '') : 'None identified', source: 'Legal Pack' },
    { label: 'Pack completeness', value: pc.completeness_pct != null ? pc.completeness_pct + '%' : '—', source: 'Document checklist' },
  ];

  // Documents reviewed
  const docRows = Array.isArray(docs) && docs.length > 0
    ? docs.map(d => ({ name: d.file_name || d.doc_type || 'Document', pages: d.page_count || '—', type: (d.doc_type || 'document').replace(/_/g,' ') }))
    : [{ name: 'Documents uploaded — detail unavailable', pages: '—', type: '—' }];

  // ────────────────────────────────────────────────────────────────
  // PAGE 1 — Snapshot, Pack Status, Disclosure Flag Cards, Summary
  // ────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────
if (_isGuest2) {
  (async function bootGuest2() {
    _g2ShowScreen();
    _g2SetProgress(5, 'Verifying payment', 'Confirming transaction with Stripe…');

    const POLL_MS  = 5000;
    const POLL_MAX = 72;
    let   attempts = 0;
    let   resolvedToken = _guestToken || null;
    let   stageIdx = 0;

    // Advance the visual stage independently of poll results
    function _advanceStage() {
      if (stageIdx < _g2Stages.length - 1) stageIdx++;
      const s = _g2Stages[stageIdx];
      const feedIdx = Math.min(stageIdx, _g2FeedMessages.length - 1);
      _g2SetProgress(s.pct, s.stage, s.sub);
      if (stageIdx > 0 && stageIdx <= _g2FeedMessages.length) {
        _g2AddFeed(_g2FeedMessages[stageIdx - 1], 'green');
      }
    }

    // Advance stage every ~18s to mirror analysis pipeline timing
    const _stageTimer = setInterval(_advanceStage, 18000);
    // First advance after 3s
    setTimeout(_advanceStage, 3000);

    while (attempts < POLL_MAX) {
      try {
        if (resolvedToken) {
          const res2 = await fetch(
            `${API_BASE}/api/guest2/report?guest_session=${encodeURIComponent(_guestSession)}&token=${encodeURIComponent(resolvedToken)}`
          );
          if (res2.status === 401 || res2.status === 404) {
            clearInterval(_stageTimer);
            showError('This report link is invalid or has expired. Please check your email for the PDF.');
            return;
          }
          if (res2.ok) {
            const data = await res2.json();
            if (data.status === 'complete' && data.summary_json) {
              clearInterval(_stageTimer);
              _g2SetProgress(100, 'Complete', 'Loading your report…');
              _g2AddFeed('Analysis complete — rendering report', 'green');
              await new Promise(r => setTimeout(r, 600));
              const sj   = data.summary_json;
              const docs = data.documents || [];
              const deal = { summary_json: sj, documents: docs, deal_score: sj.deal_score };
              renderReport(deal, sj, docs);
              return;
            }
          }
        }

        const res = await fetch(
          `${API_BASE}/api/guest2/status?guest_session=${encodeURIComponent(_guestSession)}`
        );
        if (res.status === 404) {
          clearInterval(_stageTimer);
          showError('Session expired. Please check your email for the report PDF.');
          return;
        }
        if (res.status === 402) {
          clearInterval(_stageTimer);
          showError('Payment not yet confirmed. Please wait a moment and refresh.');
          return;
        }
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'complete' && data.token) {
            resolvedToken = data.token;
            continue;
          }
          if (data.status === 'processing') {
            attempts++;
            await new Promise(r => setTimeout(r, POLL_MS));
            continue;
          }
          if (data.status === 'expired') {
            clearInterval(_stageTimer);
            showError('Session expired. Please check your email for the report PDF.');
            return;
          }
        }
      } catch(e) {
        console.warn('[guest2 poll]', e);
      }
      attempts++;
      await new Promise(r => setTimeout(r, POLL_MS));
    }
    clearInterval(_stageTimer);
    showError('Analysis is taking longer than expected. Your report will be emailed to you shortly.');
  })();
} else {

// ─────────────────────────────────────────────
// SUBSCRIBER BOOT
// ─────────────────────────────────────────────
(async function boot() {
  let accessToken = null;
  try {
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    const sb = createClient(SUPA_URL, SUPA_ANON);
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      accessToken = session.access_token;
    }
    // No forced redirect — one-off report accessible without login
    // Auth guard is soft: if token present, use it; if not, still render from API
  } catch(e) {
    console.warn('[auth]', e);
  }

  const authHeaders = accessToken
    ? { 'Authorization': 'Bearer ' + accessToken }
    : {};

  // ── 1. Fetch deal ──
  setLoading('Loading report…');

  let deal;
  try {
    const res = await fetch(`${API_BASE}/api/deals/${encodeURIComponent(dealId)}`, { headers: authHeaders });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    deal = data.deal || data;
  } catch(e) {
    showError('Could not load report data. Please check your connection and try again.');
    return;
  }

  const sj = deal.summary_json;

  // Fix 10 — Stop embedded old report from triggering summarise.
  // When loaded inside the Deal Report cockpit iframe (embedded=1), this file
  // must NEVER call /summarise. The parent page's processing flow owns analysis
  // triggering. A second concurrent /summarise call creates a write race that
  // can overwrite ceiling objects and flag state from the primary flow.\n  // In embedded mode: if analysis is not complete, show a quiet loading state\n  // and poll for completion rather than firing a duplicate analysis call.
  const _isEmbedded = new URLSearchParams(window.location.search).get('embedded') === '1';

  // ── 2. Trigger analysis if not yet complete ──
  if (!sj || sj.deal_score == null) {
    if (_isEmbedded) {
      // Embedded: do not start analysis — poll for completion from parent flow
      setLoading('Analysis in progress…');
      let _embedPoll = 0;
      const _embedInterval = setInterval(async () => {
        _embedPoll++;
        try {
          const _pr = await fetch(`${API_BASE}/api/deals/${encodeURIComponent(dealId)}`, { headers: authHeaders });
          if (_pr.ok) {
            const _pd = await _pr.json();
            const _pd2 = _pd.deal || _pd;
            if (_pd2.summary_json && _pd2.summary_json.deal_score != null) {
              clearInterval(_embedInterval);
              const docs2 = Array.isArray(_pd2.documents) ? _pd2.documents : [];
              renderReport(_pd2, _pd2.summary_json, docs2);
              return;
            }
          }
        } catch(_) {}
        if (_embedPoll >= 30) { clearInterval(_embedInterval); setLoading('Analysis not yet available — reload Deal Report.'); }
      }, 3000);
      return;
    }
    setLoading('Starting analysis — this may take 30–90 seconds…');
    try {
      const res = await fetch(`${API_BASE}/api/deals/${encodeURIComponent(dealId)}/summarise`, {
        method:  'POST',
        headers: { ...authHeaders, 'Content-Type': 'application/json' }
      });
      if (res.status === 402) {
        showError('Usage limit reached. Please contact support or upload via a subscribed account.');
        return;
      }
      if (!res.ok && res.status !== 202) {
        const d = await res.json().catch(() => ({}));
        showError('Analysis failed: ' + (d.error || 'HTTP ' + res.status));
        return;
      }
    } catch(e) {
      showError('Network error starting analysis. Please try again.');
      return;
    }

    // Poll for completion
    const POLL_MS  = 3000;
    const POLL_MAX = 60;
    let attempts = 0;

    while (attempts < POLL_MAX) {
      await new Promise(r => setTimeout(r, POLL_MS));
      attempts++;
      setLoading(`Analysing documents… (${Math.min(attempts * 5, 99)}%)`);
      try {
        const res2 = await fetch(`${API_BASE}/api/deals/${encodeURIComponent(dealId)}`, { headers: authHeaders });
        if (!res2.ok) continue;
        const data2 = await res2.json();
        const d2 = data2.deal || data2;
        if (d2.status === 'error') {
          showError('Analysis failed: ' + ((d2.summary_json||{}).error || 'Server error. Please try again.'));
          return;
        }
        if (d2.summary_json && d2.summary_json.deal_score != null) {
          const docs = Array.isArray(d2.documents) ? d2.documents : [];
          renderReport(d2, d2.summary_json, docs);
          return;
        }
      } catch(_) {}
    }
    showError('Analysis timed out. Please reload the page to check if it completed.');
    return;
  }

  // ── 3. Already analysed — load resolved flags then render ──
  // ── 3. Already analysed ──
  const docs = Array.isArray(deal.documents) ? deal.documents : [];
  renderReport(deal, sj, docs, true); // true = subscriber, show full flag detail
})();
} // end subscriber boot
