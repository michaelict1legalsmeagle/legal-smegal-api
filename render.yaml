services:
  # Monthly Land Registry data refresh — runs 21st of each month at 6am UTC
  - type: cron
    name: legal-smegal-data-refresh
    env: python
    schedule: "0 6 21 * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python refresh_data.py
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # Backend API (Python)
  - type: web
    name: legal-smegal-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false

  # Frontend (React + Vite)
  - type: static
    name: auction-property-analysis-platform
    env: static
    rootDir: .
    buildCommand: npm install && npm run build
    publishDir: dist
    staticPublishPath: dist
    autoDeploy: true
