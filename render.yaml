# LegalSmegal Frontend — Render static site configuration
# publishDir must match the directory containing all HTML files.
# Confirmed path: repository root (legalsmegal-frontend-main/).
# Build ID reference: 20250613-r1

services:
  - type: web
    name: legal-smegal-frontend
    env: static
    publishDir: .
    buildCommand: ""   # No build step — plain HTML/JS/CSS
    headers:
      - path: "/*.html"
        name: Cache-Control
        value: "no-cache, no-store, must-revalidate"
      - path: "/*.html"
        name: Pragma
        value: "no-cache"
      - path: "/*.html"
        name: Expires
        value: "0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
